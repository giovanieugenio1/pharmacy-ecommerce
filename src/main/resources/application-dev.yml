server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmacy_db
    username: pharmacy_user
    password: pharmacy_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms

app:
  admin:
    email: admin@farmacia.com
    password: ${ADMIN_PASSWORD:admin123}
  manager:
    email: manager@farmacia.com
    password: ${MANAGER_PASSWORD:manager123}

logging:
  level:
    root: INFO
    com.pharmacy.commerce: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
